<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World Oracle — hooks/detail layout options</title>
    <style>
      :root {
        --bg: #1c1f26; --panel-bg: #232732; --bar-bg: #14161c; --fg: #e6e8ee;
        --muted: #9aa3b2; --accent: #6ea8fe; --border: #343a47;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { display: flex; flex-direction: column; font: 14px/1.5 system-ui, sans-serif; background: var(--bg); color: var(--fg); overflow: hidden; }
      header#bar { display: flex; align-items: center; gap: .5rem; padding: .5rem .75rem; background: var(--bar-bg); border-bottom: 1px solid var(--border); }
      .brand { color: var(--accent); font-weight: 700; }
      .bar-note { color: var(--muted); font-size: .8rem; }
      .spacer { flex: 1; }
      header#bar button, header#bar select { font: inherit; color: var(--fg); background: #2b3140; border: 1px solid var(--border); border-radius: 6px; padding: .3rem .55rem; }
      #workspace { flex: 1; min-height: 0; position: relative; display: grid; }
      #stage { position: relative; min-width: 0; min-height: 0; background: #11131a; }
      #map { width: 100%; height: 100%; display: block; }
      .map-cap { position: absolute; left: 10px; bottom: 8px; color: #4b5566; font-size: .72rem; }

      aside, .pane { background: var(--panel-bg); border-left: 1px solid var(--border); padding: .75rem; overflow-y: auto; }
      h2.world { margin: 0 0 .5rem; font-size: 1.05rem; }
      h3 { margin: .25rem 0; font-size: .95rem; color: var(--accent); }
      .line { padding: .15rem 0; color: var(--muted); font-size: .9rem; }
      .line b { color: var(--fg); }
      .section-label { margin-top: .6rem; font-size: .7rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
      .poi-row { display: block; width: 100%; text-align: left; font-size: .85rem; padding: .25rem .5rem; margin-top: .25rem; background: #2b3140; border: 1px solid var(--border); border-radius: 6px; color: var(--fg); cursor: pointer; }
      .hint { margin-top: .6rem; color: var(--muted); font-size: .75rem; font-style: italic; }

      .hook { margin-top: .4rem; border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 4px; padding: .35rem .5rem; }
      .hook .title { font-weight: 600; margin-bottom: .15rem; }
      .hook .prose { color: var(--muted); font-size: .82rem; }
      .hook .acts { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .35rem; }
      .hook .acts button { font: inherit; font-size: .78rem; padding: .15rem .45rem; color: var(--fg); background: #2b3140; border: 1px solid var(--border); border-radius: 6px; }
      .hooks-head { font-size: .72rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }

      /* ---- A: tabs ---- */
      body.tabs #workspace { grid-template-columns: 1fr 320px; }
      .tabbar { display: flex; gap: .25rem; margin: -.75rem -.75rem .5rem; padding: .4rem .5rem 0; border-bottom: 1px solid var(--border); }
      .tabbar button { font: inherit; font-size: .85rem; color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent; padding: .35rem .6rem; cursor: pointer; }
      .tabbar button.active { color: var(--accent); border-bottom-color: var(--accent); }
      .badge { display: inline-block; min-width: 1.1rem; text-align: center; margin-left: .25rem; font-size: .7rem; background: #2b3140; border: 1px solid var(--border); border-radius: 999px; padding: 0 .25rem; color: var(--fg); }

      /* ---- B: split ---- */
      body.split #workspace { grid-template-columns: 1fr 320px; }
      body.split aside { display: flex; flex-direction: column; gap: 0; padding: 0; overflow: hidden; }
      body.split .pane { border-left: none; flex: 1 1 50%; min-height: 0; }
      body.split .pane.hooks { border-top: 4px solid var(--border); }
      .grip { text-align: center; color: var(--muted); font-size: .7rem; }

      /* ---- C: drawer ---- */
      body.drawer #workspace { grid-template-columns: 1fr 320px; grid-template-rows: 1fr auto; }
      body.drawer #stage { grid-row: 1; grid-column: 1; }
      body.drawer aside.detail { grid-row: 1 / span 2; grid-column: 2; }
      body.drawer .drawer { grid-row: 2; grid-column: 1; background: var(--panel-bg); border-top: 1px solid var(--border); max-height: 240px; overflow-y: auto; padding: .5rem .75rem; }
      body.drawer .drawer .dh { display: flex; align-items: center; gap: .5rem; }
      body.drawer .drawer .dh .chev { margin-left: auto; color: var(--muted); }
      body.drawer .drawer-cards { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; }

      /* ---- D: window ---- */
      body.window #workspace { grid-template-columns: 1fr 320px; }
      .float { position: absolute; left: 16px; bottom: 16px; width: 300px; max-height: 60%; overflow-y: auto; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
      .float .winbar { display: flex; align-items: center; gap: .5rem; padding: .35rem .55rem; background: var(--bar-bg); border-bottom: 1px solid var(--border); border-radius: 8px 8px 0 0; cursor: move; }
      .float .winbar .dots { color: var(--muted); }
      .float .winbar .x { margin-left: auto; color: var(--muted); cursor: pointer; }
      .float .body { padding: .5rem .6rem; }
      .winbtn { font: inherit; font-size: .8rem; color: var(--fg); background: #2b3140; border: 1px solid var(--border); border-radius: 6px; padding: .25rem .5rem; }
    </style>
  </head>
  <body>
    <header id="bar">
      <span class="brand">World Oracle</span>
      <select><option>Mirefen March</option></select>
      <span class="bar-note" id="layout-name"></span>
      <span class="spacer"></span>
      <button>New</button><button>Save</button><button>Export</button>
    </header>
    <div id="workspace"></div>

    <script>
      const params = new URLSearchParams(location.search);
      const layout = params.get("layout") || "tabs";
      const tab = params.get("tab") || "detail";
      document.body.classList.add(layout);
      document.getElementById("layout-name").textContent = "layout: " + layout;

      const detailHTML = `
        <h3>Selected hex</h3>
        <div class="line">Hex 4,-2</div>
        <div class="line">Coords: (4, -2)</div>
        <div class="line">Terrain: <b>Hills</b></div>
        <div class="line">Settlement: <b>Village</b></div>
        <div class="section-label">POIs</div>
        <button class="poi-row">⛩️ Wayside shrine to a forgotten god</button>
        <button class="poi-row">🏰 Old ruin — Ogre lair</button>
        <div class="hint">Right-click the hex for actions.</div>`;

      const hookCards = `
        <div class="hook"><div class="title">Threat: Bandits</div>
          <div class="prose">A war-band gathers ~12 miles NE, in the Hills. Tracked to its lair.</div>
          <div class="acts"><button>→ Target</button><button>↩ Origin</button><button>Resolve</button><button>Ignore</button></div></div>
        <div class="hook"><div class="title">Escort the salt caravan</div>
          <div class="prose">Guide traders to Riverford, ~8 miles W. Reward: a patron + 40 gp.</div>
          <div class="acts"><button>→ Target</button><button>↩ Origin</button><button>Resolve</button><button>Ignore</button></div></div>
        <div class="hook"><div class="title">A map found below</div>
          <div class="prose">Marks a Ruin ~15 miles S, across the Swamp.</div>
          <div class="acts"><button>→ Target</button><button>↩ Origin</button><button>Resolve</button><button>Ignore</button></div></div>`;
      const hooksHead = `<div class="hooks-head">Hooks — 3 open / 5 total</div>`;

      function mapHTML() { return `<canvas id="map"></canvas><div class="map-cap">hex map (right-click to act)</div>`; }

      function renderTabs() {
        const showHooks = tab === "hooks";
        document.getElementById("workspace").innerHTML = `
          <div id="stage">${mapHTML()}</div>
          <aside>
            <h2 class="world">Mirefen March</h2>
            <div class="tabbar">
              <button class="${showHooks ? "" : "active"}">Detail</button>
              <button class="${showHooks ? "active" : ""}">Hooks <span class="badge">3</span></button>
            </div>
            ${showHooks ? hooksHead + hookCards : detailHTML}
          </aside>`;
      }
      function renderSplit() {
        document.getElementById("workspace").innerHTML = `
          <div id="stage">${mapHTML()}</div>
          <aside>
            <div class="pane detail"><h2 class="world">Mirefen March</h2>${detailHTML}</div>
            <div class="pane hooks"><div class="grip">⋯ drag to resize ⋯</div>${hooksHead}${hookCards}</div>
          </aside>`;
      }
      function renderDrawer() {
        document.getElementById("workspace").innerHTML = `
          <div id="stage">${mapHTML()}</div>
          <aside class="detail"><h2 class="world">Mirefen March</h2>${detailHTML}</aside>
          <div class="drawer">
            <div class="dh">${hooksHead}<span class="chev">▾ collapse</span></div>
            <div class="drawer-cards">${hookCards}</div>
          </div>`;
      }
      function renderWindow() {
        document.getElementById("workspace").innerHTML = `
          <div id="stage">${mapHTML()}
            <div class="float">
              <div class="winbar"><span class="dots">⠿</span><strong>Hooks</strong> <span class="badge">3</span><span class="x">✕</span></div>
              <div class="body">${hookCards}</div>
            </div>
          </div>
          <aside><h2 class="world">Mirefen March</h2>${detailHTML}</aside>`;
      }

      ({ tabs: renderTabs, split: renderSplit, drawer: renderDrawer, window: renderWindow }[layout] || renderTabs)();
      drawMap(document.getElementById("map"));

      function drawMap(cv) {
        if (!cv) return;
        const dpr = window.devicePixelRatio || 1;
        const r = cv.getBoundingClientRect();
        cv.width = r.width * dpr; cv.height = r.height * dpr;
        const ctx = cv.getContext("2d"); ctx.scale(dpr, dpr);
        const S = 34, COL = { Forest: "#2f5d3a", Plains: "#7c8a3f", Hills: "#7a6438", Mountains: "#5b5f6b", Swamp: "#3d4f3a", Water: "#2f4d7c" };
        const G = { Forest: "🌲", Plains: "🌾", Hills: "⛰️", Mountains: "🏔️", Swamp: "🐊", Water: "🌊" };
        const A2P = (q, rr) => ({ x: S * Math.sqrt(3) * (q + rr / 2), y: S * 1.5 * rr });
        const cx = r.width * 0.45, cy = r.height * 0.45;
        const cells = [[0,0,"Hills",true],[1,0,"Plains"],[1,-1,"Forest"],[0,-1,"Mountains"],[-1,0,"Forest"],[-1,1,"Swamp"],[0,1,"Plains"],[2,-1,"Hills"],[2,0,"Water"],[-2,1,"Forest"],[1,1,"Swamp"],[-1,-1,"Plains"]];
        const hex = (px, py) => { ctx.beginPath(); for (let i=0;i<6;i++){const a=Math.PI/180*(60*i-90);const x=px+S*Math.cos(a),y=py+S*Math.sin(a);i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.closePath(); };
        for (const [q,rr,t,sel] of cells) {
          const p = A2P(q,rr), px = cx+p.x, py = cy+p.y;
          hex(px,py); ctx.fillStyle = COL[t]; ctx.fill();
          ctx.lineWidth = sel?3:1; ctx.strokeStyle = sel?"#6ea8fe":"rgba(0,0,0,.35)"; ctx.stroke();
          ctx.font = "16px system-ui"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(G[t]||"",px,py-4);
        }
        // POI glyphs + amber hook markers
        const mk = (q,rr,em,col) => { const p=A2P(q,rr); ctx.font="13px system-ui"; ctx.fillText(em, cx+p.x, cy+p.y+12); if(col){ctx.beginPath();ctx.arc(cx+p.x+12,cy+p.y-12,5,0,7);ctx.fillStyle=col;ctx.fill();ctx.strokeStyle="#7a5a10";ctx.stroke();} };
        mk(0,0,"⛩️"); mk(1,-1,"🏰","#e0a83a"); mk(-1,1,"⛺","#e0a83a"); mk(2,0,"","#e0a83a");
      }
    </script>
  </body>
</html>
