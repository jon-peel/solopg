<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World Oracle</title>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <header id="command-bar">
      <strong class="brand">World Oracle</strong>
      <label class="world-picker">
        World:
        <select id="world-select"></select>
      </label>
      <span class="spacer"></span>
      <button id="btn-new">New World</button>
      <button id="btn-save">Save</button>
      <button id="btn-delete">Delete</button>
      <button id="btn-export">Export</button>
      <button id="btn-import">Import</button>
      <span class="bar-divider"></span>
      <button id="btn-icons">Icons: on</button>
      <input id="import-file" type="file" accept="application/json,.json" hidden />
    </header>

    <main id="workspace">
      <div id="stage">
        <!-- Hex grid (Phase 2). The Dungeon View overlays it when open. -->
        <canvas id="map"></canvas>
        <section id="dungeon-view" hidden>
          <div id="dungeon-toolbar">
            <button id="btn-dungeon-back">← World</button>
            <strong id="dungeon-title"></strong>
            <span class="spacer"></span>
            <div id="dungeon-levels"></div>
          </div>
          <canvas id="dungeon-canvas"></canvas>
        </section>
      </div>
      <aside id="panel"></aside>
    </main>

    <script type="module" src="./js/ui/app.js"></script>
  </body>
</html>
